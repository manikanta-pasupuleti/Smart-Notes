<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Notes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .auth-header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .auth-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .toggle-form a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-form a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            color: #27ae60;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .hidden-form {
            display: none;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Login Form -->
        <div id="loginForm" class="auth-form">
            <div class="auth-header">
                <div class="logo">📝</div>
                <h1>Smart Notes</h1>
                <p>Sign in to your account</p>
            </div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username" required>
                    <div class="error-message" id="loginUsernameError"></div>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                    <div class="error-message" id="loginPasswordError"></div>
                </div>

                <button type="submit" class="submit-btn">Sign In</button>

                <div class="toggle-form">
                    Don't have an account? <a onclick="toggleForms()">Sign Up</a>
                </div>
            </form>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="auth-form hidden-form">
            <div class="auth-header">
                <div class="logo">📝</div>
                <h1>Smart Notes</h1>
                <p>Create a new account</p>
            </div>

            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <input type="text" id="regUsername" placeholder="Choose a username" required>
                    <div class="error-message" id="regUsernameError"></div>
                </div>

                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" placeholder="Enter your email" required>
                    <div class="error-message" id="regEmailError"></div>
                </div>

                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" placeholder="Create a password (min 6 chars)" required minlength="6">
                    <div class="error-message" id="regPasswordError"></div>
                </div>

                <div class="form-group">
                    <label for="regConfirmPassword">Confirm Password</label>
                    <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required>
                    <div class="error-message" id="regConfirmPasswordError"></div>
                </div>

                <button type="submit" class="submit-btn">Create Account</button>

                <div class="toggle-form">
                    Already have an account? <a onclick="toggleForms()">Sign In</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://smart-notes-1-aqab.onrender.com/api/auth';

        function toggleForms() {
            document.getElementById('loginForm').classList.toggle('hidden-form');
            document.getElementById('registerForm').classList.toggle('hidden-form');
            clearAllErrors();
        }

        function clearAllErrors() {
            document.querySelectorAll('.error-message').forEach(el => {
                el.textContent = '';
                el.style.display = 'none';
            });
        }

        async function handleLogin(event) {
            event.preventDefault();
            clearAllErrors();

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showError('loginUsernameError', 'Please fill in all fields');
                return;
            }

            const button = event.target.querySelector('button');
            button.classList.add('loading');

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError('loginPasswordError', data.error || 'Login failed');
                    return;
                }

                // Store token and user data
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify({
                    id: data.id,
                    username: data.username,
                    email: data.email
                }));

                // Redirect to notes page
                window.location.href = 'index.html';
            } catch (error) {
                showError('loginPasswordError', 'Connection error. Please try again.');
                console.error('Error:', error);
            } finally {
                button.classList.remove('loading');
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            clearAllErrors();

            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            // Validation
            if (!username || !email || !password || !confirmPassword) {
                showError('regUsernameError', 'Please fill in all fields');
                return;
            }

            if (password.length < 6) {
                showError('regPasswordError', 'Password must be at least 6 characters');
                return;
            }

            if (password !== confirmPassword) {
                showError('regConfirmPasswordError', 'Passwords do not match');
                return;
            }

            const button = event.target.querySelector('button');
            button.classList.add('loading');

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    const errorField = data.error.includes('Username') ? 'regUsernameError' : 'regEmailError';
                    showError(errorField, data.error);
                    return;
                }

                // Store token and user data
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify({
                    id: data.id,
                    username: data.username,
                    email: data.email
                }));

                // Redirect to notes page
                window.location.href = 'index.html';
            } catch (error) {
                showError('regUsernameError', 'Connection error. Please try again.');
                console.error('Error:', error);
            } finally {
                button.classList.remove('loading');
            }
        }

        function showError(elementId, message) {
            const errorEl = document.getElementById(elementId);
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        // Auto-redirect if already logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
